# Nginx для grzl.org (только админка)
# Скопировать: sudo cp nginx-grzl.org.conf /etc/nginx/sites-enabled/grzl.org
# Приложение на порту 3001 (тот же инстанс, что и gmx-net.one)

server {
    listen 80;
    server_name grzl.org www.grzl.org;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    # /mailer/ отдаёт Node (gmx/mailer) — конфиг stealer-email
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

