# Nginx для gmx-net.one
# Скопировать на сервер: sudo cp nginx-gmx-net.one.conf /etc/nginx/sites-enabled/gmx-net.one
# Порты: приложение 3001, mailer 5050 (подставьте свои при необходимости)

# 1) HTTP — для сертификата и редиректа на HTTPS
server {
    listen 80;
    server_name gmx-net.one www.gmx-net.one;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location /mailer/ {
        proxy_pass http://127.0.0.1:5050/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /mailer;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2) HTTPS — добавить ПОСЛЕ выдачи сертификата: certbot certonly --webroot -w /var/www/certbot -d gmx-net.one
